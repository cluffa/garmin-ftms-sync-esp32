name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run host tests
        run: cd test/host && make

  build-heltec-v3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: boards/heltec-v3/managed_components
          key: managed-heltec-v3-${{ hashFiles('boards/heltec-v3/main/idf_component.yml') }}
      - uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: esp32s3
          path: boards/heltec-v3
      - uses: actions/upload-artifact@v4
        with:
          name: firmware-heltec-v3
          path: boards/heltec-v3/build/garmin-ftms-sync.bin

  build-xiao-c6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: boards/xiao-c6/managed_components
          key: managed-xiao-c6-${{ hashFiles('boards/xiao-c6/main/idf_component.yml') }}
      - uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: esp32c6
          path: boards/xiao-c6
      - uses: actions/upload-artifact@v4
        with:
          name: firmware-xiao-c6
          path: boards/xiao-c6/build/garmin-ftms-sync.bin

  build-garmin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate dummy developer key
        run: openssl genrsa -out developer_key.pem 4096 && openssl pkcs8 -topk8 -inform PEM -outform DER -in developer_key.pem -out developer_key.der -nocrypt
      - name: Build Garmin Data Field
        uses: blackshadev/garmin-connectiq-build-action@9.1.0
        with:
          projectJungle: ./garmin_data_field/monkey.jungle
          developerKey: ./developer_key.der
          outputPath: ./garmin_data_field/out/app.prg
          device: fenix8solar51mm
      - uses: actions/upload-artifact@v4
        with:
          name: garmin-data-field-fenix8solar51mm
          path: ./garmin_data_field/out/app.prg

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: app
      - run: flutter build apk --release
        working-directory: app
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: app
      - run: flutter build ios --no-codesign --release
        working-directory: app
      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r app/build/ios/iphoneos/Runner.app Payload/
          zip -r app-unsigned.ipa Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: app-unsigned.ipa
